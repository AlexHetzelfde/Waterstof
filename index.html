<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waterstof Storytelling</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/scrollama"></script>
</head>
<body>

<!-- INTRO GORDIJN -->
<div id="landing-layer">
  <div class="landing-content">
    <h1>Waterstof Storytelling</h1>
    <h2>Een introductie tot de wereld van waterstof</h2>
  </div>
</div>

<!-- VASTE ACHTERGRONDEN -->
<div id="backgrounds">
  <div class="bg-slide active" style="background: #a30f14;"></div>
  <div class="bg-slide" style="background: #440808;"></div>
  <div class="bg-slide" style="background: #1a3a5c;"></div>
</div>

<!-- SCROLLBARE CONTENT -->
<div id="story">

  <section class="scene" data-index="0">
    <div class="textbox">dit is een test</div>
  </section>

  <section class="scene" data-index="1">
    <div class="textbox">dit is een test</div>
  </section>

  <section class="scene" data-index="2">
    <div class="textbox">dit is een test</div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
